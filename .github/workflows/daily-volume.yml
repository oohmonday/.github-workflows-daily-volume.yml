name: Daily Volume Summary → Discord

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC = 12:30 GMT+7 ทุกวัน
  workflow_dispatch:         # กดรันมือได้จาก GitHub UI

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Top 10 Volume & Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          node - <<'EOF'
          const https = require('https');

          // ── Exclude mainstream + stables ──────────────────
          const EXCLUDE = [
            'btc','eth','bnb','xrp','tether','usd-coin','binance-usd',
            'dai','wrapped-bitcoin','staked-ether','true-usd','first-digital-usd',
            'pax-dollar','gemini-dollar','paypal-usd'
          ];

          // ── Helper: HTTPS GET → JSON ───────────────────────
          function get(url) {
            return new Promise((res, rej) => {
              const options = {
                headers: { 'User-Agent': 'TradeWatch/1.0' }
              };
              https.get(url, options, (r) => {
                let raw = '';
                r.on('data', d => raw += d);
                r.on('end', () => {
                  try { res(JSON.parse(raw)); }
                  catch(e) { rej(new Error('JSON parse error: ' + raw.slice(0,100))); }
                });
              }).on('error', rej);
            });
          }

          // ── Format volume number ───────────────────────────
          function fmtV(v) {
            if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
            if (v >= 1e6) return (v/1e6).toFixed(2) + 'M';
            if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
            return v.toFixed(0);
          }

          // ── Main ───────────────────────────────────────────
          (async () => {
            try {
              // CoinGecko: top 50 by volume, filter out mainstream + stables
              const url = 'https://api.coingecko.com/api/v3/coins/markets'
                + '?vs_currency=usd&order=volume_desc&per_page=50&page=1'
                + '&sparkline=false&price_change_percentage=24h';

              console.log('Fetching from CoinGecko...');
              const data = await get(url);

              if (!Array.isArray(data)) {
                console.error('CoinGecko error:', JSON.stringify(data).slice(0,200));
                process.exit(1);
              }

              // Filter out mainstream + stables
              const filtered = data
                .filter(d => !EXCLUDE.includes(d.id) && d.total_volume > 0)
                .slice(0, 10);

              if (filtered.length === 0) {
                console.error('No coins after filtering');
                process.exit(1);
              }

              // Build Discord embed
              const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
              const now = new Date();
              const gmt7 = new Date(now.getTime() + 7*3600*1000);
              const dateLabel = gmt7.toISOString().slice(0,10)
                .split('-').reverse().join('/');

              const lines = filtered.map((d, i) => {
                const sym  = (d.symbol || '').toUpperCase();
                const vol  = d.total_volume || 0;
                const chg  = d.price_change_percentage_24h || 0;
                const chgTxt = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
                const chgEmoji = chg >= 2 ? '🚀' : chg >= 0 ? '📈' : chg > -2 ? '📉' : '🔻';
                return `${medals[i]} **${sym}/USDT** — Vol: \`${fmtV(vol)}\` ${chgEmoji} \`${chgTxt}\``;
              }).join('\n');

              const payload = {
                username: 'TradeWatch PRO 📊',
                embeds: [{
                  title: `📊 Top 10 Volume Ranking — ${dateLabel}`,
                  description: lines,
                  color: 0x00e5ff,
                  footer: { text: 'TradeWatch PRO • GitHub Actions • 12:30 GMT+7' },
                  timestamp: new Date().toISOString(),
                }]
              };

              // Send to Discord webhook
              const body = JSON.stringify(payload);
              const webhookUrl = new URL(process.env.DISCORD_WEBHOOK);
              await new Promise((res, rej) => {
                const req = https.request({
                  hostname: webhookUrl.hostname,
                  path: webhookUrl.pathname + webhookUrl.search,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(body),
                  }
                }, (r) => {
                  console.log('Discord status:', r.statusCode);
                  res();
                });
                req.on('error', rej);
                req.write(body);
                req.end();
              });

              console.log('✅ Top 10 Volume Summary sent to Discord!');

            } catch(err) {
              console.error('❌ Error:', err.message);
              process.exit(1);
            }
          })();
          EOF
