name: Daily Volume Summary → Discord

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC = 12:30 GMT+7 ทุกวัน
  workflow_dispatch:         # กดรันมือได้จาก GitHub UI

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Top 10 Volume & Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          node - <<'EOF'
          const https = require('https');

          // ── Exclude mainstream + stables ──────────────────
          const EXCLUDE = [
            'BTC','ETH','BNB','XRP',
            'USDC','BUSD','TUSD','FDUSD','USDT','DAI',
            'WBTC','STETH','USD','USDP','GUSD','PYUSD'
          ];

          // ── Helper: HTTPS GET → JSON ───────────────────────
          function get(url) {
            return new Promise((res, rej) => {
              https.get(url, (r) => {
                let raw = '';
                r.on('data', d => raw += d);
                r.on('end', () => {
                  try { res(JSON.parse(raw)); }
                  catch(e) { rej(e); }
                });
              }).on('error', rej);
            });
          }

          // ── Format volume number ───────────────────────────
          function fmtV(v) {
            if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
            if (v >= 1e6) return (v/1e6).toFixed(2) + 'M';
            if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
            return v.toFixed(0);
          }

          // ── Main ───────────────────────────────────────────
          (async () => {
            try {
              // Fetch all 24hr tickers from Binance
              const data = await get('https://api.binance.com/api/v3/ticker/24hr');

              // Filter: USDT pairs only, exclude mainstream + stables
              const filtered = data
                .filter(d => {
                  if (!d.symbol.endsWith('USDT')) return false;
                  const base = d.symbol.replace('USDT', '');
                  return !EXCLUDE.includes(base) && parseFloat(d.quoteVolume) > 0;
                })
                .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                .slice(0, 10);

              // Build Discord embed
              const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
              const now = new Date();
              // แปลงเป็น GMT+7
              const gmt7 = new Date(now.getTime() + 7*3600*1000);
              const dateLabel = gmt7.toISOString().slice(0,10)
                .split('-').reverse().join('/');  // DD/MM/YYYY

              const lines = filtered.map((d, i) => {
                const base = d.symbol.replace('USDT', '');
                const vol  = parseFloat(d.quoteVolume);
                const chg  = parseFloat(d.priceChangePercent);
                const chgTxt = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
                const chgEmoji = chg >= 2 ? '🚀' : chg >= 0 ? '📈' : chg > -2 ? '📉' : '🔻';
                return `${medals[i]} **${base}/USDT** — Vol: \`${fmtV(vol)}\` ${chgEmoji} \`${chgTxt}\``;
              }).join('\n');

              const payload = {
                username: 'TradeWatch PRO 📊',
                embeds: [{
                  title: `📊 Top 10 Volume Ranking — ${dateLabel}`,
                  description: lines,
                  color: 0x00e5ff,
                  footer: { text: 'TradeWatch PRO • GitHub Actions • 12:30 GMT+7' },
                  timestamp: new Date().toISOString(),
                }]
              };

              // Send to Discord webhook
              const body = JSON.stringify(payload);
              const url  = new URL(process.env.DISCORD_WEBHOOK);
              await new Promise((res, rej) => {
                const req = https.request({
                  hostname: url.hostname,
                  path: url.pathname + url.search,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(body),
                  }
                }, (r) => {
                  console.log('Discord response:', r.statusCode);
                  res();
                });
                req.on('error', rej);
                req.write(body);
                req.end();
              });

              console.log('✅ Sent Top 10 Volume Summary to Discord');

            } catch(err) {
              console.error('❌ Error:', err.message);
              process.exit(1);
            }
          })();
          EOF
